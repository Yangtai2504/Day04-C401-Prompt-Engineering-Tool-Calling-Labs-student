# starter_v0 — tool declarations (intentionally vague).
# Names and descriptions here are a rough first draft. Routing rules, name->handle
# mapping, arg conventions (news/timeframe/Top), and the send-confirmation boundary
# are NOT spelled out anywhere yet. Your job is to make these declarations + the
# system prompt good enough that the agent routes correctly on the eval.
#
# If you rename a tool, keep the name in sync across:
#   this file  ->  tools/__init__.py (TOOL_FUNCTIONS)  ->  data/eval_base.json + data/eval_research_extension.json
tools:
  # ---------------- Core tools ----------------
  - name: clarify
    description: "Hỏi người dùng khi thiếu thông tin bắt buộc hoặc cần xác nhận trước khi thực hiện hành động. Dùng response_type=text khi cần thông tin tự do (handle, URL). Dùng response_type=yes_no khi cần xác nhận hành động ghi (gửi, đăng)."
    parameters:
      type: object
      properties:
        question: {type: string, default: "", description: "Câu hỏi"}
        response_type: {type: string, enum: [text, yes_no, choice], default: "text", description: "Kiểu trả lời: text=thông tin tự do, yes_no=xác nhận hành động"}
        options: {type: array, default: [], items: {type: string}, description: "Các lựa chọn"}
      required: [question]

  - name: timeline
    description: "Lấy các bài đăng gần đây."
    parameters:
      type: object
      properties:
        screenname: {type: string, default: "", description: "Tên tài khoản"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [screenname]

  - name: social_search
    description: "Tìm trên mạng xã hội."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        search_type: {type: string, enum: [Latest, Top], default: "Latest", description: "Cách sắp xếp"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [query]

  - name: lookup
    description: "Tra cứu thông tin trên internet."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        topic: {type: string, enum: [general, news], default: "general", description: "Phân loại"}
        timeframe: {type: string, enum: [day, week, month, year], default: "week", description: "Khoảng thời gian"}
        max_results: {type: integer, default: 5, description: "Số kết quả"}
      required: [query]

  - name: fetch
    description: "Lấy nội dung từ một địa chỉ."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "Địa chỉ"}
      required: [url]

  - name: format
    description: "Trình bày dữ liệu đã có thành văn bản."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách item"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              section: {type: string}
        template: {type: string, enum: [brief, sections, bullets, thread, daily_ai_vn], default: "sections", description: "Khuôn"}
        headline: {type: string, default: "", description: "Tiêu đề"}
      required: [items, template]

  - name: trending
    description: "Lấy danh sách trending topics trên Twitter/X theo quốc gia. Dùng khi user muốn biết chủ đề đang hot mà không có keyword cụ thể. Khác với social_search (tìm theo keyword), trending trả về những gì đang được thảo luận nhiều nhất hiện tại."
    parameters:
      type: object
      properties:
        country: {type: string, default: "worldwide", description: "Tên quốc gia hoặc mã (vd: vietnam, us, japan, worldwide)"}
        limit: {type: integer, default: 10, description: "Số lượng trending topics trả về"}
      required: []

  - name: cite
    description: "Format citation (trích dẫn) cho một bài báo arXiv theo style BibTeX, APA, hoặc plain text. Dùng sau khi có arxiv_id từ tool papers. Không cần API ngoài."
    parameters:
      type: object
      properties:
        arxiv_id: {type: string, default: "", description: "arXiv ID, ví dụ: 1706.03762"}
        style: {type: string, enum: [bibtex, apa, plain], default: "bibtex", description: "Format citation: bibtex cho LaTeX, apa cho văn bản, plain cho text thông thường"}
      required: [arxiv_id]

  - name: summarize
    description: "Trích xuất các ý chính từ văn bản thô (nội dung từ fetch hoặc paper_text) thành danh sách key points. Dùng khi cần tóm tắt sâu nội dung đầy đủ, không phải abstract. Truyền trường 'text' từ kết quả của paper_text hoặc fetch vào đây."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Nội dung văn bản cần tóm tắt"}
        max_points: {type: integer, default: 5, description: "Số lượng ý chính tối đa"}
        lang: {type: string, default: "auto", description: "Ngôn ngữ (auto tự phát hiện)"}
      required: [text]

  # ---------------- Bonus tools ----------------
  - name: send
    description: "Gửi một đoạn văn bản lên Telegram. CHỈ gọi tool này khi confirmed=true. Trước khi gọi send, BẮT BUỘC phải gọi clarify với response_type=yes_no để xác nhận với người dùng. Không bao giờ gọi send trực tiếp mà không có bước xác nhận."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Nội dung cần gửi"}
        confirmed: {type: boolean, default: false, description: "Phải là true — chỉ set true sau khi người dùng xác nhận qua clarify"}
      required: [text]

  - name: policy
    description: "Tìm trong tài liệu nội bộ."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        policy_area: {type: string, enum: [all, ai_research, source_citation, data_privacy, external_publishing, tool_usage], default: "all", description: "Nhóm"}
        top_k: {type: integer, default: 3, description: "Số mục"}
      required: [query]

  - name: papers
    description: "Tìm bài báo khoa học."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        max_results: {type: integer, default: 5, description: "Số lượng"}
        sort_by: {type: string, enum: [relevance, lastUpdatedDate, submittedDate], default: "relevance", description: "Sắp xếp"}
      required: [query]

  - name: paper_text
    description: "Lấy nội dung text của một bài báo."
    parameters:
      type: object
      properties:
        arxiv_url: {type: string, default: "", description: "ID hoặc địa chỉ"}
        max_pages: {type: integer, default: 5, description: "Số trang"}
        max_chars: {type: integer, default: 8000, description: "Số ký tự"}
      required: [arxiv_url]
